<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow, noarchive, noimageindex, nosnippet">
  <meta name="googlebot" content="noindex, nofollow">
  <meta name="bingbot" content="noindex, nofollow">
  <meta name="GPTBot" content="noindex, nofollow">
  <meta name="CCBot" content="noindex, nofollow">
  <meta name="Google-Extended" content="noindex, nofollow">
  <meta name="anthropic-ai" content="noindex, nofollow">
  <link rel="icon" href="https://images.kfdzcoffee.cn/i/1/avatar.png">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css" />
  <style>
    /* ===== HarmonyOS Design Token ===== */
    :root {
      --hm-primary: #007DFF;
      --hm-primary-light: #E5F0FF;
      --hm-bg: #F1F3F5;
      --hm-bg-card: #FFFFFF;
      --hm-bg-sidebar: #F7F8FA;
      --hm-text-primary: #1A1A1A;
      --hm-text-secondary: #666666;
      --hm-text-tertiary: #999999;
      --hm-border: #E0E0E0;
      --hm-border-light: #F0F0F0;
      --hm-radius-lg: 16px;
      --hm-radius-md: 12px;
      --hm-radius-sm: 8px;
      --hm-shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --hm-shadow-md: 0 2px 8px rgba(0,0,0,0.08);
      --hm-font: "HarmonyOS Sans", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }
    body {
      font-family: var(--hm-font);
      background: var(--hm-bg);
      -webkit-font-smoothing: antialiased;
      margin: 0;
    }
    .sidebar {
      background: var(--hm-bg-sidebar) !important;
      border-right: 1px solid var(--hm-border-light) !important;
      padding-top: 8px !important;
    }
    .sidebar-nav li > a {
      font-family: var(--hm-font);
      font-size: 14px;
      color: var(--hm-text-primary);
      padding: 10px 16px;
      border-radius: var(--hm-radius-sm);
      margin: 2px 8px;
      transition: background 0.15s;
    }
    .sidebar-nav li > a:hover {
      background: var(--hm-primary-light);
      color: var(--hm-primary);
    }
    .sidebar-nav li.active > a {
      background: var(--hm-primary-light) !important;
      color: var(--hm-primary) !important;
      font-weight: 600;
      border-right: 3px solid var(--hm-primary) !important;
    }
    .sidebar-nav li > span {
      font-family: var(--hm-font);
      font-size: 14px;
      color: var(--hm-text-primary);
      display: block;
      padding: 10px 16px;
      border-radius: var(--hm-radius-sm);
      margin: 2px 8px;
      transition: background 0.15s;
    }
    .sidebar-nav li > span:hover {
      background: var(--hm-primary-light);
      color: var(--hm-primary);
    }
    .content {
      background: var(--hm-bg);
      padding-top: 0 !important;
    }
    .markdown-section {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 32px;
      font-family: var(--hm-font);
      color: var(--hm-text-primary);
      line-height: 1.85;
    }
    .markdown-section h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--hm-text-primary);
      margin: 0 0 20px 0;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--hm-primary);
    }
    .markdown-section h2 {
      font-size: 22px;
      font-weight: 600;
      color: var(--hm-text-primary);
      margin: 32px 0 16px;
      padding-left: 12px;
      border-left: 4px solid var(--hm-primary);
    }
    .markdown-section h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--hm-text-primary);
      margin: 24px 0 12px;
    }
    .markdown-section p {
      margin: 12px 0;
      font-size: 15px;
      color: var(--hm-text-secondary);
    }
    .markdown-section a { color: var(--hm-primary); text-decoration: none; }
    .markdown-section a:hover { text-decoration: underline; }
    .markdown-section code {
      background: var(--hm-primary-light);
      color: var(--hm-primary);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 13px;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    }
    .markdown-section pre {
      background: #1E1E2E;
      border-radius: var(--hm-radius-md);
      padding: 16px 20px;
      overflow-x: auto;
    }
    .markdown-section pre code { background: none; color: #CDD6F4; padding: 0; }
    .markdown-section blockquote {
      background: var(--hm-primary-light);
      border-left: 4px solid var(--hm-primary);
      border-radius: 0 var(--hm-radius-sm) var(--hm-radius-sm) 0;
      padding: 14px 18px;
      margin: 20px 0;
      font-size: 14px;
    }
    .markdown-section blockquote p { margin: 4px 0; color: var(--hm-text-primary); }
    .markdown-section blockquote strong { color: var(--hm-primary); }
    .markdown-section .table-wrapper {
      overflow-x: auto;
      margin: 20px 0;
      padding: 4px 2px;
      border-radius: var(--hm-radius-md);
      box-shadow: var(--hm-shadow-md);
    }
    .markdown-section table {
      display: table;
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 14px;
      background: var(--hm-bg-card);
      border-radius: var(--hm-radius-md);
      overflow: hidden;
    }
    .markdown-section th {
      background: var(--hm-bg-sidebar);
      font-weight: 600;
      text-align: center;
      padding: 12px 14px;
      color: var(--hm-text-primary);
      font-size: 13px;
      border-bottom: 1px solid var(--hm-border);
    }
    .markdown-section td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--hm-border-light);
      vertical-align: middle;
      color: var(--hm-text-secondary);
    }
    .markdown-section tr:last-child td { border-bottom: none; }
    .markdown-section td:first-child { text-align: left; font-weight: 500; color: var(--hm-text-primary); }
    .markdown-section td:not(:first-child) { text-align: center; }
    .markdown-section hr { margin: 28px 0; border: none; height: 1px; background: var(--hm-border-light); }
    .math { display: inline-block; }
    footer {
      font-family: var(--hm-font);
      text-align: center;
      padding: 20px;
      color: var(--hm-text-tertiary);
      font-size: 12px;
      border-top: 1px solid var(--hm-border-light);
      background: var(--hm-bg-sidebar);
      margin-left: 300px;
      width: calc(100% - 300px);
      box-sizing: border-box;
    }
    .search { margin: 12px 12px 0 12px; }
    .search input {
      font-family: var(--hm-font);
      background: var(--hm-bg-card);
      border: 1px solid var(--hm-border);
      border-radius: var(--hm-radius-sm);
      padding: 10px 14px;
      font-size: 14px;
      transition: border 0.15s;
      width: 100%;
      box-sizing: border-box;
      color: var(--hm-text-primary);
    }
    .search input:focus {
      outline: none;
      border-color: var(--hm-primary);
      box-shadow: 0 0 0 3px rgba(0,125,255,0.1);
    }
    .search input::placeholder { color: var(--hm-text-tertiary); }
    .search .results-panel {
      font-family: var(--hm-font);
      background: var(--hm-bg-card);
      border-radius: var(--hm-radius-md);
      box-shadow: var(--hm-shadow-md);
      margin-top: 8px;
    }
    .search .matching-post {
      padding: 12px 16px;
      border-bottom: 1px solid var(--hm-border-light);
      transition: background 0.15s;
    }
    .search .matching-post:hover { background: var(--hm-primary-light); }
    .search .matching-post:last-child { border-bottom: none; }
    #app {
      font-family: var(--hm-font);
      color: var(--hm-text-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-size: 16px;
      background: var(--hm-bg);
    }
    .github-corner { display: none; }
    @media (min-width: 1200px) { .markdown-section { max-width: 900px; } }
  </style>
</head>
<body>
  <div id="app">加载中…</div>
  <footer style="text-align:center;padding:20px;color:#999;font-size:0.8rem;border-top:1px solid #eee;margin-top:40px;">
    Copyright &copy; 2026 Kfdzcoffee. All Rights Reserved.
  </footer>
  <script>
    window.$docsify = {
      name: '📚 错题知识库',
      nameLink: '/',
      loadSidebar: true,
      subMaxLevel: 1,
      auto2top: true,
      search: {
        placeholder: '搜索错题...',
        noData: '没有找到相关错题',
        paths: 'auto',
        depth: 4,
      },
      plugins: [
        function(hook, vm) {
          hook.afterEach(function(html, next) {
            // 给表格包裹响应式容器
            html = html.replace(/<table>/g, '<div class="table-wrapper"><table>');
            html = html.replace(/<\/table>/g, '</table></div>');
            next(html);
          });
          hook.doneEach(function() {
            if (window.MathJax) {
              MathJax.typesetPromise();
            }
          });
          // 侧边栏：默认折叠各科"错题记录"下的子题列表
          function collapseSidebarFolders() {
            var sidebar = document.querySelector('.sidebar-nav');
            if (!sidebar) return;
            var allLis = sidebar.querySelectorAll('li');
            allLis.forEach(function(li) {
              var childUl = li.querySelector('ul');
              if (!childUl) return;
              // 收集 <li> 的直接文本节点（docsify 把纯文本条目渲染为直接文本节点，非 <p> 标签）
              var textContent = '';
              var textNodes = [];
              var hasStructuredContent = false;
              for (var i = 0; i < li.childNodes.length; i++) {
                var node = li.childNodes[i];
                if (node.nodeType === 3) { // Text node
                  var t = node.textContent.trim();
                  if (t) { textContent += t; textNodes.push(node); }
                } else if (node.nodeType === 1) { // Element node
                  if (node.tagName === 'UL') break; // 到达子 <ul>，停止
                  hasStructuredContent = true; // 有其他元素节点，跳过
                  break;
                }
              }
              if (!textContent || hasStructuredContent) return;
              // 初始折叠
              childUl.style.display = 'none';
              // 将文本节点替换为可点击的 span
              var span = document.createElement('span');
              span.textContent = '▸ ' + textContent;
              span.style.cursor = 'pointer';
              span.style.userSelect = 'none';
              span.setAttribute('data-folder', 'collapsed');
              textNodes.forEach(function(n) { li.removeChild(n); });
              li.insertBefore(span, childUl);
              span.addEventListener('click', function(e) {
                e.stopPropagation();
                if (childUl.style.display === 'none') {
                  childUl.style.display = '';
                  span.textContent = '▾ ' + textContent;
                  span.setAttribute('data-folder', 'expanded');
                } else {
                  childUl.style.display = 'none';
                  span.textContent = '▸ ' + textContent;
                  span.setAttribute('data-folder', 'collapsed');
                }
              });
            });
          }
          // MutationObserver：等侧边栏渲染完成
          var sidebarObserver = new MutationObserver(function(mutations, obs) {
            var sidebar = document.querySelector('.sidebar-nav');
            if (sidebar && sidebar.querySelectorAll('li').length > 0) {
              collapseSidebarFolders();
              obs.disconnect();
            }
          });
          hook.ready(function() {
            sidebarObserver.observe(document.body, { childList: true, subtree: true });
            // 兜底：500ms 后无论如何执行一次
            setTimeout(collapseSidebarFolders, 500);
          });
        }
      ]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <!-- 搜索插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- MathJax -->
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: false,
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>
  <script id="MathJax-script" async src="//cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</body>
</html>
